<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Lista de Reportes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list *ngIf="reportes.length > 0; else noReportes">
    <ion-item *ngFor="let reporte of reportes" lines="inset">
      <ion-thumbnail slot="start" *ngIf="reporte.foto">
        <ion-img [src]="reporte.foto" alt="Foto del reporte"></ion-img>
      </ion-thumbnail>
      <ion-label>
        <h2>{{ reporte.tipo }}</h2>
        <p><strong>Reportado por:</strong> {{ reporte.nombre }}</p>
        <p><strong>Descripción:</strong> {{ reporte.descripcion }}</p>
        <p><strong>Fecha:</strong> {{ reporte.fecha }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ng-template #noReportes>
    <ion-text color="medium">
      <p class="ion-text-center">No hay reportes disponibles.</p>
    </ion-text>
  </ng-template>
</ion-content>
