<ion-list>
  @for (reporte of reportes; track reporte.id) {
    <ion-item>
      <ion-label>
        <h2>{{ reporte.titulo }}</h2>
        <p>{{ reporte.descripcion }}</p>
        <p><strong>Estado:</strong> {{ reporte.estado }}</p>

        <!-- Imagen con tamaño fijo y mejor estilo -->
        @if (reporte.foto_url) {
          <div style="margin-top: 8px; text-align: center;">
            <img 
              [src]="reporte.foto_url" 
              alt="Foto del reporte" 
              style="max-width: 100%; 
                     max-height: 200px; 
                     border-radius: 8px;
                     object-fit: cover;
                     display: block;
                     margin: 0 auto;">
          </div>
        }
      </ion-label>

      <!-- Selector de estado -->
      <ion-select 
        [value]="reporte.estado" 
        (ionChange)="actualizarEstado(reporte.id, $event.detail.value)"
        interface="action-sheet">
        @for (estado of estados; track estado) {
          <ion-select-option [value]="estado">
            {{ estado }}
          </ion-select-option>
        }
      </ion-select>

      <!-- Botón eliminar -->
      <ion-button 
        slot="end"
        color="danger" 
        fill="clear" 
        (click)="borrarReporte(reporte.id)">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  }
</ion-list>
