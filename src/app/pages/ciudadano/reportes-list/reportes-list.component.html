<ion-header>
  <ion-toolbar color="primary">
    <!-- Botón de Inicio -->
    <ion-buttons slot="start">
      <ion-button (click)="irAInicio()">
        <ion-icon name="home-outline" slot="start"></ion-icon>
        Inicio
      </ion-button>
    </ion-buttons>

    <!-- Título -->
    <ion-title>REPORTE CIUDADANO</ion-title>

    <!-- Botón de Cerrar Sesión -->
    <ion-buttons slot="end">
      <ion-button (click)="cerrarSesion()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Cerrar sesión
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Filtro por categoría dentro del header -->
  <ion-toolbar color="light">
    <ion-item lines="none">
      <ion-label>Filtrar por Categoría</ion-label>
      <ion-select [(ngModel)]="categoriaSeleccionada" interface="popover">
        <ion-select-option value="">Todas</ion-select-option>
        <ion-select-option value="Vial">Vial</ion-select-option>
        <ion-select-option value="Seguridad">Seguridad</ion-select-option>
        <ion-select-option value="Servicios">Servicios</ion-select-option>
      </ion-select>
    </ion-item>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Tabla de reportes -->
  <ion-grid class="ion-padding">
    <ion-row class="table-header ion-text-center">
      <ion-col size="2"><strong>Nombre</strong></ion-col>
      <ion-col size="2"><strong>Apellidos</strong></ion-col>
      <ion-col size="2"><strong>Correo</strong></ion-col>
      <ion-col size="2"><strong>Teléfono</strong></ion-col>
      <ion-col size="2"><strong>Tipo</strong></ion-col>
      <ion-col size="2"><strong>Categoría</strong></ion-col>
    </ion-row>

    <ion-row
      *ngFor="let reporte of reportesFiltrados()"
      class="table-row ion-text-center"
    >
      <ion-col size="2">{{ reporte.nombre }}</ion-col>
      <ion-col size="2">{{ reporte.apellidos }}</ion-col>
      <ion-col size="2">{{ reporte.correo }}</ion-col>
      <ion-col size="2">{{ reporte.telefono }}</ion-col>
      <ion-col size="2">{{ reporte.tipo }}</ion-col>
      <ion-col size="2">{{ reporte.categoria }}</ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
