<ion-content class="login-content">
  <div class="login-container">
    
    <!-- Logo/Imagen -->
    <div class="logo-container">
      <img src="assets/icon/SAN_PABLO_HUIXTEPEC-OAXACA.jpg" alt="Logo" class="logo-image">
    </div>

    <!-- Formulario de Login -->
    <div class="form-container">
      
      <!-- Campo Usuario -->
      <div class="input-group">
        <ion-item class="input-item">
          <ion-label position="floating">Usuario:</ion-label>
          <ion-input 
            type="text" 
            [(ngModel)]="usuario"
            placeholder="Ingrese su usuario">
          </ion-input>
        </ion-item>
      </div>

      <!-- Campo Contraseña -->
      <div class="input-group">
        <ion-item class="input-item">
          <ion-label position="floating">Contraseña:</ion-label>
          <ion-input 
            type="password" 
            [(ngModel)]="contrasena"
            placeholder="Ingrese su contraseña">
          </ion-input>
        </ion-item>
      </div>

      <!-- Botón Ingresar -->
      <ion-button 
        expand="block" 
        class="login-button"
        (click)="ingresar()">
        Ingresar
      </ion-button>

      <!-- Link Registro -->
      <div class="register-link">
        <ion-button (click)="registrarse()" class="register-text">
          Registrate
        </ion-button>
      </div>

    </div>
  </div>
</ion-content>
<router-outlet></router-outlet>
