<ion-app>
  <!-- Menú Lateral -->
  <ion-menu contentId="main-content" type="overlay" swipeGesture="true">
    <ion-header>
      <ion-toolbar >
        <ion-title style="font-weight: 600;">ReportesApp</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeMenu()">
            <ion-icon slot="icon-only" name="close"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <!-- Sección Usuario -->
      <div class="user-section">
       
        <h3>Usuario Actual</h3>
        <p>usuarioejemplo.com</p>
      </div>

      <!-- Sección Principal -->
      <ion-list lines="none">
        <ion-menu-toggle auto-hide="false">
          <ion-item 
            routerLink="/formulario-reporte" 
            routerDirection="root" 
            detail="false"
            class="menu-item">
            <ion-icon slot="start" name="document-text"></ion-icon>
            <ion-label>Nuevo Reporte</ion-label>
          </ion-item>

          <ion-item 
            routerLink="/admin-reportes" 
            routerDirection="root"
            detail="false"
            class="menu-item">
            <ion-icon slot="start" name="folder-open"></ion-icon>
            <ion-label>Mis Reportes</ion-label>
            <ion-badge slot="end" >3</ion-badge>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>

      <!-- Sección Secundaria -->
      <ion-list lines="none">
        <ion-item 
          button 
          detail="false"
          class="menu-item secondary">
          <ion-icon slot="start" name="settings"></ion-icon>
          <ion-label>Configuración</ion-label>
        </ion-item>

        <ion-item 
          button 
          detail="false"
          class="menu-item secondary">
          <ion-icon slot="start" name="help-circle"></ion-icon>
          <ion-label>Ayuda</ion-label>
        </ion-item>
      </ion-list>

      <!-- Footer -->
      <div class="menu-footer">
        <ion-button expand="block" fill="clear" size="small">
          <ion-icon slot="start" name="log-out"></ion-icon>
          Cerrar Sesión
        </ion-button>
        <p style="font-size: 12px; margin-top: 20px;">v1.0.0</p>
      </div>
    </ion-content>
  </ion-menu>

  <!-- Contenido Principal -->
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
